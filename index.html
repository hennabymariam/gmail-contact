<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>
:root{
    --bg:#ffffff;
    --card:#fafafa;
    --text:#222;
    --muted:#777;
    --border:#e8e8e8;
    --accent:#111;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:24px;
}

.card{
    width:100%;
    max-width:420px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    padding:36px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.05);
}

h1{
    font-size:28px;
    margin-bottom:10px;
}

p{
    color:var(--muted);
    margin-bottom:24px;
}

.email{
    font-size:18px;
    font-weight:600;
    margin-bottom:28px;
    word-break:break-word;
}

button,a{
    display:block;
    width:100%;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
    text-decoration:none;
    font-size:16px;
    border:none;
    cursor:pointer;
    transition:.2s;
}

.primary{
    background:var(--accent);
    color:white;
}

.secondary{
    background:white;
    color:var(--text);
    border:1px solid var(--border);
}

button:hover,
a:hover{
    transform:translateY(-1px);
}

#copied{
    color:#2e7d32;
    margin-top:12px;
    font-size:14px;
    display:none;
}
</style>
</head>

<body>

<div class="card">

<h1>Contact</h1>

<p>Choose how you'd like to reach me.</p>

<div class="email" id="email">
mehendibymariam@gmail.com
</div>

<button class="primary" onclick="copyEmail()">
Copy Email Address
</button>

<a class="secondary"
href="https://mail.google.com/mail/?view=cm&fs=1&to=mehendibymariam@gmail.com">
Open in Gmail
</a>

<a class="secondary"
href="https://outlook.live.com/mail/0/deeplink/compose?to=mehendibymariam@gmail.com">
Open in Outlook
</a>

<a class="secondary"
href="mailto:mehendibymariam@gmail.com">
Use Default Mail App
</a>

<div id="copied">
✓ Email copied to clipboard
</div>

</div>

<script>
function copyEmail(){
const email="mehendibymariam@gmail.com";
navigator.clipboard.writeText(email).then(()=>{
document.getElementById("copied").style.display="block";
});
}
</script>

</body>
</html>
